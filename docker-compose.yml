version: "3.9"
networks:
  fraud-net:
    driver: bridge

volumes:
  kafka-data:
  zookeeper-data:
  mlflow-data:
  model-data:

services:

  # ─── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - fraud-net
    restart: unless-stopped
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - fraud-net
    restart: unless-stopped
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Kafka Topic Setup ───────────────────────────────────────────────────────
  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud-kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - fraud-net
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic fraud-transactions --partitions 3 --replication-factor 1 && \
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic fraud-alerts --partitions 1 --replication-factor 1 && \
      echo 'Topics created successfully'
      "
    restart: "no"

  # ─── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: fraud-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlruns
    networks:
      - fraud-net
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "pip install mlflow>=2.8.0 --quiet &&
       mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns"
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:5000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Fraud Detection API ─────────────────────────────────────────────────────
  fraud-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: fraud-api
    ports:
      - "8000:8000"
      - "8001:8001"  # Prometheus metrics
    environment:
      - APP_ENV=production
      - CONFIG_PATH=config/config.yaml
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - model-data:/app/data/models:ro
      - ./data/processed:/app/data/processed:ro
    networks:
      - fraud-net
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:8000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # ─── Fraud Dashboard ─────────────────────────────────────────────────────────
  fraud-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: fraud-dashboard
    ports:
      - "8501:8501"
    environment:
      - FRAUD_API_URL=http://fraud-api:8000
      - CONFIG_PATH=config/config.yaml
    networks:
      - fraud-net
    depends_on:
      fraud-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:8501/_stcore/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

